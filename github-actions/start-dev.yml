name: Start dev server

on:
  workflow_dispatch:
    inputs:
      region:
        description: "DigitalOcean region slug"
        required: false
        default: "fra1"
      size:
        description: "Droplet size slug"
        required: false
        default: "s-2vcpu-4gb"

jobs:
  start:
    name: Create droplet
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render Ignition config
        run: |
          podman run --rm -i quay.io/coreos/butane:release \
            --pretty --strict < config/butane/digitalocean.bu \
            > config/ignition/digitalocean.ign

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        working-directory: terraform/digitalocean
        run: terraform init

      - name: Terraform apply
        working-directory: terraform/digitalocean
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
          TF_VAR_region: ${{ github.event.inputs.region }}
          TF_VAR_droplet_size: ${{ github.event.inputs.size }}
          TF_VAR_coreos_image_slug: ${{ vars.COREOS_IMAGE_SLUG }}
          TF_VAR_ssh_key_name: ${{ vars.DO_SSH_KEY_NAME }}
        run: terraform apply -auto-approve

      - name: Print WireGuard endpoint
        working-directory: terraform/digitalocean
        env:
          TF_VAR_do_token: ${{ secrets.DO_TOKEN }}
        run: terraform output wireguard_endpoint
