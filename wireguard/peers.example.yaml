# peers.example.yaml — documentation of stable peer VPN address assignments.
# Real public keys live in secrets/wireguard/ (gitignored).
# Manage peers with: make wg-add-peer PEER=<name> IP=<vpn-ip>
#
# VPN subnet: 10.44.0.0/24

peers:
  - name: server
    vpn_ip: "10.44.0.1"
    note: "VM — key generated at first boot, stored at /mnt/state/wireguard/server_public.key"

  - name: laptop
    vpn_ip: "10.44.0.2"
    public_key: "REPLACE_WITH_REAL_PUBLIC_KEY=="

  - name: desktop
    vpn_ip: "10.44.0.3"
    public_key: "REPLACE_WITH_REAL_PUBLIC_KEY=="

  - name: phone
    vpn_ip: "10.44.0.4"
    public_key: "REPLACE_WITH_REAL_PUBLIC_KEY=="
